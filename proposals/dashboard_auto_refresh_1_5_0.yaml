release: 1.5.0
contract_name: dashboard_auto_refresh
status: implemented
priority: dashboard_usability
confidence: high

summary:
  goal: >
    Add a dashboard-level auto-refresh control that can run Forge's existing
    background dashboard refresh at a user-selected interval.
  user_value:
    - Keeps Vault Health visible and current without repeated manual refreshes.
    - Preserves manual refresh for users who prefer explicit scans.
    - Uses the existing dashboard snapshot cache instead of adding a second scan path.

dashboard_surface:
  placement:
    required: true
    position: very_top_of_dashboard
    reason: >
      Auto-refresh is a dashboard-wide mode, so it should appear before
      health summary, status pills, and section actions.

  controls:
    enabled_toggle:
      type: button
      labels:
        enabled: Auto-refresh enabled
        disabled: Auto-refresh disabled
      default: disabled
      persists: true

    interval_selector:
      type: select
      enabled_only_when_auto_refresh_enabled: true
      allowed_minutes:
        - 1
        - 3
        - 5
        - 15
        - 30
      default_minutes: 5
      persists: true

behavior:
  refresh_path:
    required: use_background_silent_refresh
    implementation: dashboardService.refreshSnapshot
    source_command: refresh-vault-health-dashboard

  schedule:
    starts_when:
      - dashboard_view_opens
      - user_enables_auto_refresh
      - user_changes_interval_while_enabled
    stops_when:
      - dashboard_view_closes
      - user_disables_auto_refresh
      - interval_is_changed_and_timer_is_replaced

  concurrency:
    rule: do_not_start_a_new_refresh_if_one_is_already_running
    reason: >
      Dashboard scans can touch lint, schema, ontology, shape lint, and patch
      history caches. Overlapping scans would add load without improving freshness.

  error_handling:
    user_notice: false
    log_warning: true
    reason: >
      Silent auto-refresh should not interrupt note taking. Manual refresh
      remains the explicit path for user-visible errors.

settings_contract:
  fields:
    dashboardAutoRefreshEnabled:
      type: boolean
      default: false
      owner: dashboard

    dashboardAutoRefreshIntervalMinutes:
      type: enum_integer
      allowed_values:
        - 1
        - 3
        - 5
        - 15
        - 30
      default: 5
      owner: dashboard

non_goals:
  - no_global_background_worker_when_dashboard_is_closed
  - no_new_cache_file
  - no_new_command_required
  - no_user_notice_on_scheduled_refresh_success_or_failure

acceptance_criteria:
  - Auto-refresh control appears at the very top of the Vault Health dashboard.
  - Users can enable or disable auto-refresh from the dashboard.
  - Users can choose 1, 3, 5, 15, or 30 minutes when auto-refresh is enabled.
  - The selected mode and interval persist across dashboard reopen and plugin reload.
  - Scheduled refreshes call the existing dashboard refresh service silently.
  - Scheduled refreshes do not overlap with a currently running manual or automatic refresh.
